---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app hydra-server
  namespace: flux-system
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets-bitwarden
  path: ./kubernetes/apps/default/hydra-server/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false # no flux ks dependents
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: hydra-server-config
      MFS_CAPACITY: 2Gi
      MFS_ACCESSMODES: ReadWriteOnce
      APP2: hydra-server-data
      MFS2_CAPACITY: 20Gi
      MFS2_ACCESSMODES: ReadWriteOnce

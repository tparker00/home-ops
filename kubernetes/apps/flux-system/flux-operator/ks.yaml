---
# yaml-language-server: $schema=https://schemas.ajgon.casa/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  patches: []
  path: ./kubernetes/apps/flux-system/flux-operator
  postBuild:
    substitute:
      SECRET_DOMAIN: "${SECRET_DOMAIN}"
    substituteFrom:
      - kind: Secret
        name: flux-operator-oidc-credentials
        optional: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: flux-system
  wait: true

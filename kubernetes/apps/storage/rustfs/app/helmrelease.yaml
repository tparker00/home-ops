---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rustfs
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  dependsOn: []
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      rustfs:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: rustfs/rustfs
              tag: 1.0.0-beta.8@sha256:fa19210ac4697c79d7ccca1ec9b0eb91aebacc6691991ffb14014bb3c67e6cc3
            env:
              RUSTFS_ADDRESS: ":9000"
              RUSTFS_CONSOLE_ADDRESS: ":9001"
              RUSTFS_CONSOLE_ENABLE: "true"
              RUSTFS_BROWSER_REDIRECT_URL: "https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"
              RUSTFS_SERVER_DOMAINS: "${S3_SUBDOMAIN}.${SECRET_DOMAIN}"
              RUSTFS_DRIVE_LIST_DIR_TIMEOUT_SECS: 300
              RUSTFS_DRIVE_WALKDIR_TIMEOUT_SECS: 300
              RUSTFS_DRIVE_WALKDIR_STALL_TIMEOUT_SECS: 600
              RUSTFS_CAPACITY_STAT_TIMEOUT: 300
              RUSTFS_CAPACITY_MAX_TIMEOUT: 1200
              RUSTFS_CAPACITY_STALL_TIMEOUT: 600
              RUSTFS_DRIVE_METADATA_TIMEOUT_SECS: 300
              RUSTFS_DRIVE_TIMEOUT_PROFILE: high_latency
              RUSTFS_SCANNER_SPEED: slow
            envFrom:
              - secretRef:
                  name: *app
            args:
              - /data
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: ${GATUS_PATH}
                    port: &port 9000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: false
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                memory: 100Mi
                cpu: 100m
    service:
      app:
        controller: *app
        primary: true
        ports:
          http:
            port: &http 9001
          s3:
            port: *port
    route:
      app:
        hostnames:
          - "${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *http
      s3:
        hostnames:
          - "s3.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
      analogpuddle:
        hostnames:
          - "${GATUS_SUBDOMAIN}.analogpuddle.com"
        parentRefs:
          - name: envoy-internal-ap
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *http
      analogpuddle-s3:
        hostnames:
          - "s3.analogpuddle.com"
        parentRefs:
          - name: envoy-internal-ap
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      data:
        enabled: true
        existingClaim: minio-rw
        globalMounts:
          - path: /data
